<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Teacher Monitoring Dashboard</h1>
    <div id="clock"></div>
    <input type="text" id="searchBar" placeholder="Search teacher...">
</header>

<div class="teacher-grid" id="teacherGrid"></div>

<div class="admin-section">
    <button id="adminLoginBtn" onclick="document.getElementById('loginModal').style.display='flex'">Admin Login</button>
    <button id="logoutBtn" style="display:none;" onclick="location.reload()">Logout</button>
    <button class="admin-only" onclick="openAdd()">+ Add Teacher</button>
</div>

<div class="modal" id="profileModal">
    <div class="modal-content">
        <h2 id="profileName"></h2>
        <img id="profilePhoto" class="profile-img" alt="Teacher Photo">
        <br><br>
        <button onclick="viewSchedule()">View Schedule</button>
        <br><br>
        <div class="admin-only">
            <button class="delete" onclick="deleteTeacher()">Delete Teacher</button>
        </div>
        <br>
        <button onclick="closeProfile()">Close</button>
    </div>
</div>

<div class="modal" id="addModal">
    <div class="modal-content">
        <h2>Add Teacher</h2>
        <input type="text" id="teacherName" placeholder="Full Name">
        <br><br>
        <p style="font-size:12px; color:#94a3b8;">Optional: Upload Photo</p>
        <input type="file" id="teacherPhoto" accept="image/*">
        <br><br>
        <button onclick="saveTeacher()">Save</button>
        <button onclick="closeAdd()">Cancel</button>
    </div>
</div>

<div id="scheduleViewer" onclick="this.style.display='none'">
    <img id="scheduleFull" alt="Schedule">
</div>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Password">
        <br><br>
        <button onclick="loginAdmin()">Login</button>
        <button onclick="document.getElementById('loginModal').style.display='none'">Cancel</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
